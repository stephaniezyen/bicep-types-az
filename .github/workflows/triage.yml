name: Auto-triage issues

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write
  contents: read

concurrency:
  group: triage-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        with:
          script: |
            const MARKER = '<!-- auto-triage-bot:v3 -->';
            const DOCS_BASE = 'https://learn.microsoft.com/en-us/azure/templates';
            const UA = 'bicep-types-az-triage-bot/3.0';

            const RP_REGEX = /\bMicrosoft\.[A-Za-z][A-Za-z0-9]*/gi;
            const TYPE_REGEX = /\bMicrosoft\.[A-Za-z][A-Za-z0-9]*(?:\/[A-Za-z][A-Za-z0-9]*)+/gi;

            const MISSING_PROPERTY_REGEXES = [
              /\bmissing\b[^.\n]{0,60}\b(propert|field|attribute)/i,
              /\b(propert(y|ies)|field|attribute)\s+\S+\s+(is|are)\s+missing\b/i,
              /\b(does(\s+not|n['']?t)|do(\s+not|n['']?t))\s+(have|expose|include|support|define|list)\b[^.\n]{0,60}\b(propert|field|attribute)/i,
              /\b(should|needs?\s+to)\s+(have|expose|include|support|define|list|add)\b[^.\n]{0,60}\b(propert|field|attribute)/i,
              /\black(s|ing)?\b[^.\n]{0,60}\b(propert|field|attribute)/i,
              /\bunrecognized\s+propert/i,
              /\b(propert(y|ies)|field|attribute)\s+\S+\s+(does(\s+not|n['']?t)\s+exist|is\s+not\s+(defined|exposed|present|available|listed))/i,
              /\badd\s+[`'\w.\s]{0,40}(propert(y|ies)|field|attribute)\b/i,
              /\bexpose\s+[`'\w.\s]{0,40}(propert|field|attribute)/i,
              /\bnot\s+exposed\s+in\s+the\s+(type|schema|api)/i,
            ];

            const PROPERTY_NAME_REGEXES = [
              /\bmissing\b[^.\n]{0,60}?[`'"]([A-Za-z_][\w.-]*)[`'"]\s+(?:propert(?:y|ies)|field|attribute)/i,
              /\b(?:propert(?:y|ies)|field|attribute)\s+[`'"]?([A-Za-z_][\w.-]*)[`'"]?\s+(?:is|are)\s+missing\b/i,
              /\b(?:does(?:\s+not|n['']?t)|do(?:\s+not|n['']?t))\s+(?:have|expose|include|support|define|list)\b[^.\n]{0,60}?[`'"]([A-Za-z_][\w.-]*)[`'"]\s+(?:propert(?:y|ies)|field|attribute)/i,
              /\b(?:should|needs?\s+to)\s+(?:have|expose|include|support|define|list|add)\b[^.\n]{0,60}?[`'"]([A-Za-z_][\w.-]*)[`'"]\s+(?:propert(?:y|ies)|field|attribute)/i,
              /\black(?:s|ing)?\b[^.\n]{0,60}?[`'"]([A-Za-z_][\w.-]*)[`'"]\s+(?:propert(?:y|ies)|field|attribute)/i,
              /\bunrecognized\s+propert(?:y|ies)?\s+[`'"]?([A-Za-z_][\w.-]*)[`'"]?/i,
              /\b(?:propert(?:y|ies)|field|attribute)\s+[`'"]?([A-Za-z_][\w.-]*)[`'"]?\s+(?:does(?:\s+not|n['']?t)\s+exist|is\s+not\s+(?:defined|exposed|present|available|listed))/i,
              /\badd\s+[`'"]?([A-Za-z_][\w.-]*)[`'"]?\s+(?:propert(?:y|ies)|field|attribute)\b/i,
              /\bexpose\s+[`'"]?([A-Za-z_][\w.-]*)[`'"]?\s+(?:propert|field|attribute)/i,
            ];

            // Language indicating "the type itself is wrong / unavailable / does not exist".
            // Intentionally separate from missing-property language.
            const TYPE_ISSUE_REGEXES = [
              /\btype\s+(?:is\s+)?(?:unavailable|not\s+available|missing|not\s+found)/i,
              /\btype\s+does(?:\s+not|n['']?t)\s+exist/i,
              /\bno\s+such\s+resource\s+type\b/i,
              /\bunknown\s+resource\s+type\b/i,
              /\bBCP081\b/i,
              /\bResource\s+type\s+[^\n.]{0,80}\s+does\s+not\s+have\s+types\s+available\b/i,
              /\btype\s+(?:definition\s+)?is\s+(?:wrong|incorrect|inaccurate)/i,
            ];

            function normalizeNs(raw) {
              const suffix = raw.slice('Microsoft.'.length);
              const uniform = suffix === suffix.toLowerCase() || suffix === suffix.toUpperCase();
              const norm = uniform
                ? suffix[0].toUpperCase() + suffix.slice(1).toLowerCase()
                : suffix;
              return 'Microsoft.' + norm;
            }

            function extractMissingProperty(text) {
              for (const regex of PROPERTY_NAME_REGEXES) {
                const match = regex.exec(text);
                if (match?.[1]) return match[1];
              }
              return null;
            }

            function classify(text) {
              const rpMap = new Map();
              for (const m of text.matchAll(RP_REGEX)) {
                const c = normalizeNs(m[0]);
                if (!rpMap.has(c.toLowerCase())) rpMap.set(c.toLowerCase(), c);
              }
              const typeMap = new Map();
              for (const m of text.matchAll(TYPE_REGEX)) {
                const [ns, ...rest] = m[0].split('/');
                const c = [normalizeNs(ns), ...rest].join('/');
                if (!typeMap.has(c.toLowerCase())) typeMap.set(c.toLowerCase(), c);
              }
              return {
                rps: [...rpMap.values()],
                types: [...typeMap.values()],
                hasMissingPropertyLanguage: MISSING_PROPERTY_REGEXES.some(r => r.test(text)),
                hasTypeIssueLanguage: TYPE_ISSUE_REGEXES.some(r => r.test(text)),
                propertyName: extractMissingProperty(text),
              };
            }

            // Fetch the full docs page text for property-name verification.
            async function fetchDocsText(type) {
              const url = `${DOCS_BASE}/${type.toLowerCase()}`;
              try {
                const res = await fetch(url, { redirect: 'follow', headers: { 'User-Agent': UA } });
                if (!res.ok) return { url, status: res.status, text: null };
                const html = await res.text();
                const text = html
                  .replace(/<script[\s\S]*?<\/script>/gi, ' ')
                  .replace(/<style[\s\S]*?<\/style>/gi, ' ')
                  .replace(/<[^>]+>/g, ' ')
                  .replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&')
                  .replace(/&lt;/g, '<').replace(/&gt;/g, '>')
                  .replace(/&quot;/g, '"').replace(/&#39;/g, "'")
                  .replace(/\s+/g, ' ')
                  .trim();
                return { url, status: res.status, text };
              } catch (e) {
                return { url, status: null, text: null, error: e.message };
              }
            }

            // Case-insensitive whole-word search.
            function pageHasWord(pageText, word) {
              if (!pageText || !word) return false;
              const esc = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              return new RegExp(`(?<![A-Za-z0-9_])${esc}(?![A-Za-z0-9_])`, 'i').test(pageText);
            }

            function hashColor(s) {
              let h = 5381;
              for (let i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) & 0xffffff;
              return h.toString(16).padStart(6, '0');
            }

            async function ensureLabel(label, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label });
              } catch (e) {
                if (e.status !== 404) throw e;
                try {
                  await github.rest.issues.createLabel({
                    owner, repo, name: label,
                    color: hashColor(label),
                    description: description || `Auto-triage label: ${label}`,
                  });
                  core.info(`Created label ${label}`);
                } catch (createErr) {
                  if (createErr.status !== 422) throw createErr;
                }
              }
            }

            // --- run ---
            const { owner, repo } = context.repo;
            const issue = context.payload.issue;
            const num = issue.number;
            const action = context.payload.action;

            if (issue.state === 'closed') {
              core.info('Issue already closed, skipping.');
              return;
            }

            const text = `${issue.title || ''}\n\n${issue.body || ''}`;
            const cls = classify(text);
            core.info(
              `Extracted rps=[${cls.rps.join(', ')}] types=[${cls.types.join(', ')}] ` +
              `typeIssue=${cls.hasTypeIssueLanguage} missingProp=${cls.hasMissingPropertyLanguage} ` +
              `propertyName=${cls.propertyName || ''}`
            );

            // Idempotency: if we've already triaged this issue, don't re-comment.
            const priorComments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: num, per_page: 100,
            });
            const alreadyTriaged = priorComments.some(c =>
              c.user && c.user.type === 'Bot' && (c.body || '').includes(MARKER)
            );

            // --- Property verification against docs (only when we have a named property + a type) ---
            let propertyVerification = null; // { found: bool, url, type, property }
            if (cls.hasMissingPropertyLanguage && cls.propertyName && cls.types.length > 0) {
              const t = cls.types[0];
              const docs = await fetchDocsText(t);
              core.info(`Docs fetch for ${t}: status=${docs.status} length=${docs.text ? docs.text.length : 0}`);
              if (docs.text) {
                const found = pageHasWord(docs.text, cls.propertyName);
                propertyVerification = { found, url: docs.url, type: t, property: cls.propertyName };
                core.info(`Property '${cls.propertyName}' found in docs for ${t}: ${found}`);
              }
            }

            // --- Compose labels ---
            const labelsToApply = new Set(cls.rps);

            if (cls.hasTypeIssueLanguage) {
              labelsToApply.add('type issue');
            }

            if (cls.hasMissingPropertyLanguage) {
              if (propertyVerification && propertyVerification.found) {
                labelsToApply.add('property found');
              } else {
                labelsToApply.add('missing property');
              }
            }

            // --- Duplicate detection ---
            // Rule: same exact property name (when extractable), OR same exact type for a type-issue,
            // matches an older open issue with the same signal. We only LABEL + COMMENT, never close.
            let duplicateMatches = []; // array of { number, createdAt, reason }
            if (!alreadyTriaged && (cls.propertyName || (cls.hasTypeIssueLanguage && cls.types.length > 0))) {
              const allOpen = await github.paginate(github.rest.issues.listForRepo, {
                owner, repo, state: 'open', per_page: 100,
              });
              for (const other of allOpen) {
                if (other.number === num) continue;
                if (other.pull_request) continue;
                if (new Date(other.created_at) >= new Date(issue.created_at)) continue;
                const otherText = `${other.title || ''}\n\n${other.body || ''}`;
                const otherCls = classify(otherText);
                if (cls.propertyName && otherCls.propertyName &&
                    otherCls.propertyName.toLowerCase() === cls.propertyName.toLowerCase()) {
                  duplicateMatches.push({
                    number: other.number,
                    createdAt: other.created_at,
                    reason: `same property \`${cls.propertyName}\``,
                  });
                  continue;
                }
                if (cls.hasTypeIssueLanguage && otherCls.hasTypeIssueLanguage) {
                  const otherTypesLower = new Set(otherCls.types.map(t => t.toLowerCase()));
                  const sharedType = cls.types.find(t => otherTypesLower.has(t.toLowerCase()));
                  if (sharedType) {
                    duplicateMatches.push({
                      number: other.number,
                      createdAt: other.created_at,
                      reason: `same type \`${sharedType}\` with type-issue language`,
                    });
                  }
                }
              }
              duplicateMatches.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
            }

            if (duplicateMatches.length > 0) {
              labelsToApply.add('possible-duplicate');
            }

            // --- Apply labels ---
            const labelArr = [...labelsToApply];
            for (const label of labelArr) {
              await ensureLabel(label);
            }
            if (labelArr.length > 0) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: num, labels: labelArr,
              });
              core.info(`Applied labels: ${labelArr.join(', ')}`);
            } else {
              core.info('No labels to apply.');
            }

            // --- Title normalization for confirmed missing-property issues ---
            if (cls.hasMissingPropertyLanguage && cls.propertyName && cls.types.length > 0 &&
                !(propertyVerification && propertyVerification.found)) {
              const normalizedTitle = `[${cls.types[0]}]: ${cls.propertyName} property missing`;
              if (issue.title !== normalizedTitle) {
                await github.rest.issues.update({
                  owner, repo, issue_number: num, title: normalizedTitle,
                });
                core.info(`Renamed issue to: ${normalizedTitle}`);
              }
            }

            // --- Comments ---
            if (alreadyTriaged) {
              core.info('Already triaged previously; skipping comments.');
              return;
            }

            const commentBlocks = [];

            // "Property found in docs" comment (contradiction).
            if (propertyVerification && propertyVerification.found) {
              commentBlocks.push(
                `I checked the Azure template docs for **\`${propertyVerification.type}\`** and found ` +
                `the property \`${propertyVerification.property}\` documented:\n\n` +
                `${propertyVerification.url}\n\n` +
                `Could you double-check spelling and the API version you're targeting? ` +
                `If the property is working for you, feel free to close.`
              );
            }

            // Possible-duplicate comment (don't close — just flag for maintainer review).
            if (duplicateMatches.length > 0) {
              const list = duplicateMatches.slice(0, 5)
                .map(d => `- #${d.number} (${d.reason}, opened ${d.createdAt.slice(0, 10)})`)
                .join('\n');
              commentBlocks.push(
                `🤔 This looks like it may duplicate:\n\n${list}\n\n` +
                `Labeled \`possible-duplicate\` for maintainer review — not auto-closing.`
              );
            }

            // Acknowledgement comment on opened (only if no other comment was posted).
            if (commentBlocks.length === 0 && action === 'opened') {
              const lines = ['Thanks for the report! Auto-triage detected:', ''];
              if (cls.rps.length > 0) {
                lines.push(`- **Resource provider${cls.rps.length > 1 ? 's' : ''}:** ` +
                  cls.rps.map(r => `\`${r}\``).join(', '));
              }
              if (cls.types.length > 0) {
                lines.push(`- **Type${cls.types.length > 1 ? 's' : ''}:** ` +
                  cls.types.map(t => `\`${t}\``).join(', '));
              }
              if (cls.hasTypeIssueLanguage) {
                lines.push(`- Labeled \`type issue\` based on language about the type being wrong or unavailable.`);
              }
              if (cls.hasMissingPropertyLanguage) {
                lines.push(`- Labeled \`missing property\`` +
                  (cls.propertyName ? ` (extracted property: \`${cls.propertyName}\`)` : '') + `.`);
              }
              if (lines.length > 2) {
                lines.push('', 'A maintainer will follow up.');
                commentBlocks.push(lines.join('\n'));
              }
            }

            if (commentBlocks.length > 0) {
              const body = `${MARKER}\n` + commentBlocks.join('\n\n---\n\n');
              await github.rest.issues.createComment({ owner, repo, issue_number: num, body });
              core.info(`Posted ${commentBlocks.length} comment block(s).`);
            }
