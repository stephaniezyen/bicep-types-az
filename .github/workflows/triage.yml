name: Auto-triage issues

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write
  contents: read

concurrency:
  group: triage-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # All triage logic lives in .github/scripts/triage.mjs (the single source
      # of truth). This step just loads that module and runs it with the
      # github-script toolkit (Octokit `github`, event `context`, `core`).
      - uses: actions/github-script@v7
        with:
          script: |
            const { pathToFileURL } = require('url');
            const modUrl = pathToFileURL(
              `${process.env.GITHUB_WORKSPACE}/.github/scripts/triage.mjs`
            ).href;
            const mod = await import(modUrl);
            await mod.run({ github, context, core });