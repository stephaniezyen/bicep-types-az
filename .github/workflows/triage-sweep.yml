name: Triage sweep (manual)

on:
  workflow_dispatch:

permissions:
  issues: write
  models: read
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/triage-playbook.md
            .github/scripts

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sweep
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          MODEL: openai/gpt-4o-mini
        run: node .github/scripts/triage.mjs --mode=sweep
